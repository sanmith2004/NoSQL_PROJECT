<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Events — Discover & Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <a href="/" class="brand">
    <span class="brand-icon">🎓</span>
    <span>Campus Events</span>
  </a>
  <nav>
    <a href="/" class="active">Events</a>
    <a href="/admin-panel">Admin</a>
  </nav>
</header>

<!-- Notification Panel -->
<div id="notif-panel" class="notif-panel"></div>

<!-- Hero -->
<section class="hero">
  <div class="hero-inner">
    <h1>Discover Campus Events</h1>
    <p>Workshops, hackathons, seminars and guest lectures — register in seconds, track seats live.</p>
  </div>
</section>

<!-- Main Content -->
<main class="container">

  <!-- Filter Bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-type="all">All Events</button>
    <button class="filter-btn" data-type="workshop">🔧 Workshop</button>
    <button class="filter-btn" data-type="hackathon">💻 Hackathon</button>
    <button class="filter-btn" data-type="seminar">🎤 Seminar</button>
    <button class="filter-btn" data-type="guest_lecture">🌟 Guest Lecture</button>
  </div>

  <!-- Events Grid -->
  <div id="events-grid" class="events-grid">
    <div class="spinner"></div>
  </div>

</main>

<!-- Registration Modal -->
<div class="modal-overlay" id="reg-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="reg-modal-title">Register for Event</h2>
      <button class="modal-close" onclick="closeModal('reg-modal')" aria-label="Close">✕</button>
    </div>
    <div id="reg-alert"></div>
    <form id="reg-form">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="e.g. Aarav Patel" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" placeholder="you@college.edu" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="reg-dept">Department</label>
        <input type="text" id="reg-dept" placeholder="e.g. CSE, ECE, ME" required />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('reg-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="reg-submit-btn">Register Now</button>
      </div>
    </form>
  </div>
</div>

<!-- Cancel Modal -->
<div class="modal-overlay" id="cancel-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="cancel-modal-title">Cancel Registration</h2>
      <button class="modal-close" onclick="closeModal('cancel-modal')" aria-label="Close">✕</button>
    </div>
    <div id="cancel-alert"></div>
    <form id="cancel-form">
      <div class="form-group">
        <label for="cancel-email">Your Email Address</label>
        <input type="email" id="cancel-email" placeholder="you@college.edu" required autocomplete="email" />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('cancel-modal')">Back</button>
        <button type="submit" class="btn btn-danger" id="cancel-submit-btn">Cancel Registration</button>
      </div>
    </form>
  </div>
</div>

<script src="/static/js/notifications.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
