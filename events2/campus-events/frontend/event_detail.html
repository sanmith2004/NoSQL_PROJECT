<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Details</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<header class="navbar">
  <a href="/" class="brand">🎓 Campus Events</a>
  <nav>
    <a href="/">Events</a>
    <a href="/admin-panel">Admin</a>
  </nav>
</header>

<div id="notif-panel" class="notif-panel"></div>

<main class="container">
  <a href="/" class="btn btn-outline btn-sm" style="margin-bottom:1.5rem;display:inline-flex">← Back</a>
  <div id="detail-content"><div class="spinner"></div></div>
</main>

<!-- Registration Modal -->
<div class="modal-overlay" id="reg-modal">
  <div class="modal">
    <h2 id="reg-modal-title">Register</h2>
    <div id="reg-alert"></div>
    <form id="reg-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" required />
      </div>
      <div class="form-group">
        <label>Department</label>
        <input type="text" id="reg-dept" required />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('reg-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="reg-submit-btn">Register</button>
      </div>
    </form>
  </div>
</div>

<!-- Cancel Modal -->
<div class="modal-overlay" id="cancel-modal">
  <div class="modal">
    <h2>Cancel Registration</h2>
    <div id="cancel-alert"></div>
    <form id="cancel-form">
      <div class="form-group">
        <label>Your Email</label>
        <input type="email" id="cancel-email" required />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('cancel-modal')">Back</button>
        <button type="submit" class="btn btn-danger" id="cancel-submit-btn">Cancel Registration</button>
      </div>
    </form>
  </div>
</div>

<script src="/static/js/notifications.js"></script>
<script>
const API = "http://localhost:5000";
const eventId = location.pathname.split("/").pop();
let eventData = null;
let cdTimer = null;

document.addEventListener("DOMContentLoaded", async () => {
  initNotifications();
  await loadEvent();
  setupForms();
});

async function loadEvent() {
  try {
    const res = await fetch(`${API}/events/${eventId}`);
    if (!res.ok) throw new Error("Not found");
    eventData = await res.json();
    renderDetail(eventData);
  } catch (e) {
    document.getElementById("detail-content").innerHTML =
      '<div class="alert alert-error">Event not found.</div>';
  }
}

function renderDetail(e) {
  const isFull = e.available_seats <= 0;
  const pct = Math.round((e.available_seats / e.max_seats) * 100);
  const fillClass = pct > 40 ? "fill-ok" : pct > 10 ? "fill-warning" : "fill-danger";
  const dateStr = new Date(e.date).toLocaleString("en-IN");

  const attrs = (e.attributes || []).map(a =>
    `<tr><td><strong>${a.key}</strong></td><td>${a.value}</td></tr>`
  ).join("");

  document.getElementById("detail-content").innerHTML = `
    <div style="background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:2rem;max-width:700px">
      <span class="event-type-badge badge-${e.type}" style="margin-bottom:.75rem">${e.type.replace("_"," ")}</span>
      <h1 style="font-size:1.75rem;margin-bottom:.5rem">${e.title}</h1>
      <div class="event-meta" style="margin-bottom:1.5rem">
        <span>📅 ${dateStr}</span>
        <span>📍 ${e.venue}</span>
      </div>

      <div class="seats-bar-wrap" style="margin-bottom:1rem">
        <div class="seats-label">
          <span>Available Seats</span>
          <span id="seats-detail">${e.available_seats} / ${e.max_seats}</span>
        </div>
        <div class="seats-bar" style="height:10px">
          <div class="seats-bar-fill ${fillClass}" id="bar-detail" style="width:${pct}%"></div>
        </div>
      </div>

      <div class="countdown" id="cd-detail" style="font-size:1rem;margin-bottom:1.5rem">
        ${e.countdown_seconds > 0 ? "⏳ " + fmtCd(e.countdown_seconds) : "🔴 Event started"}
      </div>

      ${attrs ? `
      <h3 style="margin-bottom:.75rem">Event Details</h3>
      <div class="table-wrap" style="margin-bottom:1.5rem">
        <table><tbody>${attrs}</tbody></table>
      </div>` : ""}

      <div style="display:flex;gap:1rem;flex-wrap:wrap">
        <button class="btn btn-primary" id="reg-btn" onclick="openRegModal('${e._id}','${e.title}')"
          ${isFull ? "disabled" : ""}>${isFull ? "Event Full" : "Register Now"}</button>
        <button class="btn btn-outline" onclick="openCancelModal()">Cancel Registration</button>
      </div>
    </div>
  `;

  if (e.countdown_seconds > 0) startCd(e.countdown_seconds);
}

function startCd(s) {
  let rem = s;
  const el = document.getElementById("cd-detail");
  cdTimer = setInterval(() => {
    rem--;
    if (!el) return;
    if (rem <= 0) { el.textContent = "🔴 Event started"; clearInterval(cdTimer); }
    else el.textContent = "⏳ " + fmtCd(rem);
  }, 1000);
}

function fmtCd(s) {
  const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600),
        m = Math.floor((s%3600)/60), sec = s%60;
  const p = [];
  if(d) p.push(d+"d"); if(h) p.push(h+"h"); if(m) p.push(m+"m"); p.push(sec+"s");
  return p.join(" ");
}

function openRegModal(id, title) {
  document.getElementById("reg-modal-title").textContent = `Register: ${title}`;
  document.getElementById("reg-alert").innerHTML = "";
  document.getElementById("reg-form").reset();
  document.getElementById("reg-modal").classList.add("open");
}

function openCancelModal() {
  document.getElementById("cancel-alert").innerHTML = "";
  document.getElementById("cancel-form").reset();
  document.getElementById("cancel-modal").classList.add("open");
}

function closeModal(id) { document.getElementById(id).classList.remove("open"); }

function setupForms() {
  document.getElementById("reg-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("reg-submit-btn");
    btn.disabled = true; btn.textContent = "Registering...";
    const body = {
      name: document.getElementById("reg-name").value.trim(),
      email: document.getElementById("reg-email").value.trim(),
      department: document.getElementById("reg-dept").value.trim()
    };
    try {
      const res = await fetch(`${API}/events/${eventId}/register`, {
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
      });
      const d = await res.json();
      if (res.ok) {
        document.getElementById("reg-alert").innerHTML =
          `<div class="alert alert-success">✅ Registered! Seats left: ${d.available_seats ?? "N/A"}</div>`;
        updateSeats(d.available_seats);
        setTimeout(() => closeModal("reg-modal"), 2000);
      } else {
        document.getElementById("reg-alert").innerHTML =
          `<div class="alert alert-error">❌ ${d.error}</div>`;
      }
    } catch(_) {
      document.getElementById("reg-alert").innerHTML =
        '<div class="alert alert-error">Network error.</div>';
    } finally { btn.disabled=false; btn.textContent="Register"; }
  });

  document.getElementById("cancel-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("cancel-submit-btn");
    btn.disabled = true; btn.textContent = "Cancelling...";
    const email = document.getElementById("cancel-email").value.trim();
    try {
      const res = await fetch(`${API}/events/${eventId}/register`, {
        method:"DELETE", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email})
      });
      const d = await res.json();
      if (res.ok) {
        document.getElementById("cancel-alert").innerHTML =
          `<div class="alert alert-success">✅ Cancelled. Seats now: ${d.available_seats ?? "N/A"}</div>`;
        updateSeats(d.available_seats);
        setTimeout(() => closeModal("cancel-modal"), 2000);
      } else {
        document.getElementById("cancel-alert").innerHTML =
          `<div class="alert alert-error">❌ ${d.error}</div>`;
      }
    } catch(_) {
      document.getElementById("cancel-alert").innerHTML =
        '<div class="alert alert-error">Network error.</div>';
    } finally { btn.disabled=false; btn.textContent="Cancel Registration"; }
  });
}

function updateSeats(available) {
  const el = document.getElementById("seats-detail");
  const bar = document.getElementById("bar-detail");
  const btn = document.getElementById("reg-btn");
  if (!eventData) return;
  const max = eventData.max_seats;
  const avail = available ?? 0;
  if (el) el.textContent = `${avail} / ${max}`;
  if (bar) {
    const pct = Math.round((avail/max)*100);
    bar.style.width = pct + "%";
    bar.className = `seats-bar-fill ${pct>40?"fill-ok":pct>10?"fill-warning":"fill-danger"}`;
  }
  if (btn) { btn.disabled = avail<=0; btn.textContent = avail<=0 ? "Event Full" : "Register Now"; }
}
</script>
</body>
</html>
